name = "cloudflare-markdown-blog"
compatibility_date = "2026-06-19"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "BLOG_DB"
database_name = "cloudflare_markdown_blog"
database_id = "1e3e11b2-7954-4585-8cc6-23889af2447a"

[[r2_buckets]]
binding = "BLOG_BUCKET"
bucket_name = "cloudflare-markdown-blog"

[vars]
SITE_NAME = "YUNA 最新动态"
PUBLIC_BASE_URL = "https://yuna.liugu.cc"
AUTHENTIK_ISSUER = "https://sso.yuna.welain.com/application/o/yuna-docs/"
AUTHENTIK_CLIENT_ID = "esxw1ynBDm6B6r5dzIdCtBfJ3ifkKVk7WbIRD7Py"
AUTHENTIK_REDIRECT_PATH = "/auth/callback"

# 拥有全部控制权限的 Authentik 用户组；留空则没有登录用户拥有控制权限。
CONTROL_GROUP = "yuna-docs-edit"

# Markdown 自动备份到私有 GitHub 仓库；token 用 Pages secret GITHUB_BACKUP_TOKEN。
GITHUB_BACKUP_REPO = ""
GITHUB_BACKUP_BRANCH = "main"
GITHUB_BACKUP_PATH = "yuna-blog"
GITHUB_BACKUP_AUTHOR_NAME = "YUNA Blog Bot"
GITHUB_BACKUP_AUTHOR_EMAIL = "yuna-blog-bot@example.invalid"
