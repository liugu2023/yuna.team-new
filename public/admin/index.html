<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>动态管理 · 燕山大学大学生网络信息协会</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell">
        <a class="brand" href="/"><img src="/logo.svg" alt="YUNA" />YUNA</a>
        <nav class="nav">
          <a href="/">最新动态</a>
          <a href="/api/auth/logout">退出登录</a>
        </nav>
      </div>
    </header>
    <main class="page">
      <div class="shell">
        <section class="toolbar">
          <div>
            <h1>动态管理</h1>
            <p class="lede">发布协会新闻、活动记录、课程通知和成员动态。</p>
          </div>
          <a class="button secondary" href="/">返回首页</a>
        </section>

        <section class="auth-panel" data-auth-panel>
          正在检查登录状态...
        </section>

        <div class="admin-layout" data-editor hidden>
          <section class="editor">
            <div class="grid">
              <label>
                标题
                <input data-title placeholder="文章标题" />
              </label>
              <label>
                状态
                <select data-status>
                  <option value="draft">草稿</option>
                  <option value="published">已发布</option>
                </select>
              </label>
            </div>
            <label>
              链接标识
              <input data-slug placeholder="hello-world" />
            </label>
            <label>
              摘要
              <input data-excerpt placeholder="文章简短摘要" />
            </label>
            <label>
              Markdown 内容
              <textarea data-markdown placeholder="# Hello"></textarea>
            </label>
            <div class="inline-uploader">
              <label>
                文章图片
                <input data-post-image-file type="file" accept="image/*" />
              </label>
              <button class="secondary" data-upload-post-image>上传并插入图片</button>
            </div>
            <div class="actions">
              <button data-save>保存</button>
            <button class="secondary" data-publish>发布</button>
            <button class="secondary" data-draft>转为草稿</button>
            <button class="secondary" data-seed>生成测试文章</button>
            <button class="secondary" data-new>新建</button>
            <button class="danger" data-delete hidden>删除</button>
            </div>
            <p data-message class="meta"></p>
          </section>
          <aside class="preview">
            <p class="meta">实时预览</p>
            <div class="preview-body article-body" data-preview></div>
          </aside>
        </div>

        <section class="editor admin-tooling" data-admin-tools hidden>
          <h2>固定栏目</h2>
          <div class="grid">
            <label>
              栏目
              <select data-structured-key>
                <option value="members">协会成员</option>
                <option value="hall-of-fame">名人堂</option>
              </select>
            </label>
            <label>
              届数
              <input data-structured-term placeholder="第九届" />
            </label>
          </div>
          <div class="grid">
            <label data-members-only>
              部门
              <select data-structured-department>
                <option value="主席团">主席团</option>
                <option value="开发部">开发部</option>
                <option value="网络安全部">网络安全部</option>
                <option value="运维部">运维部</option>
                <option value="组宣部">组宣部</option>
                <option value="秘书处">秘书处</option>
              </select>
            </label>
            <label data-members-only>
              职位
              <select data-structured-role>
                <option value="主席">总主席（主席）</option>
                <option value="开发部副主席">开发部副主席</option>
                <option value="网络安全部副主席">网络安全部副主席</option>
                <option value="运维部副主席">运维部副主席</option>
                <option value="组宣部副主席">组宣部副主席</option>
                <option value="秘书处副主席">秘书处副主席</option>
                <option value="开发部部长">开发部部长</option>
                <option value="网络安全部部长">网络安全部部长</option>
                <option value="运维部部长">运维部部长</option>
                <option value="组宣部部长">组宣部部长</option>
                <option value="秘书处部长">秘书处部长</option>
              </select>
            </label>
          </div>
          <div class="grid">
            <label>
              姓名 / 标题
              <input data-structured-name placeholder="成员姓名或名人堂条目标题" />
            </label>
            <label data-fame-only hidden>
              名人堂头衔
              <input data-structured-title placeholder="第六届主席 / 竞赛获奖成员" />
            </label>
          </div>
          <label>
            头像或图片 URL
            <input data-structured-avatar placeholder="/media/avatars/example.png" />
          </label>
          <div class="inline-uploader">
            <label>
              头像或图片
              <input data-structured-image-file type="file" accept="image/*" />
            </label>
            <button class="secondary" data-upload-structured-image>上传并填入图片 URL</button>
          </div>
          <label>
            简介
            <textarea data-structured-desc placeholder="支持简单文字，链接请填在下面的链接字段"></textarea>
          </label>
          <div class="grid">
            <label>
              链接标题
              <input data-structured-link-label placeholder="GitHub" />
            </label>
            <label>
              链接地址
              <input data-structured-link-url placeholder="https://github.com/yuna2017" />
            </label>
          </div>
          <div class="actions">
            <button data-load-structured>读取栏目</button>
            <button data-add-structured>添加条目</button>
            <button data-save-structured>保存栏目</button>
          </div>
          <p data-structured-message class="meta"></p>
          <div class="post-list" data-structured-list></div>
        </section>

        <section>
          <h2>文章列表</h2>
          <div class="filters">
            <input data-search placeholder="搜索标题、摘要或链接标识" />
            <select data-filter-status>
              <option value="all">全部状态</option>
              <option value="published">已发布</option>
              <option value="draft">草稿</option>
            </select>
          </div>
          <div class="post-list" data-post-list></div>
        </section>
      </div>
    </main>
    <script src="/app.js"></script>
    <script src="/admin/admin.js"></script>
  </body>
</html>
