<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>最新动态 · 燕山大学大学生网络信息协会</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell">
        <a class="brand" href="/"><img src="/logo.svg" alt="YUNA" />YUNA</a>
        <nav class="nav">
          <a href="/page.html?p=about-us/index">关于我们</a>
          <a href="/page.html?p=lessons/index">授课链接</a>
          <a href="/page.html?p=join-us/how-to">加入我们</a>
          <span data-user-nav><a href="/api/auth/login">成员登录</a></span>
        </nav>
      </div>
    </header>
    <main class="blog-shell">
      <aside class="float-panel float-left" aria-label="协会入口">
        <img class="panel-logo" src="/logo-doubleline.svg" alt="YUNA" />
        <p class="panel-kicker">燕山大学</p>
        <h2>大学生网络信息协会</h2>
        <div class="campus-stats" aria-label="协会概览">
          <span><strong>2017</strong>成立</span>
          <span><strong>6</strong>组织方向</span>
          <span><strong>120+</strong>成员</span>
        </div>
        <a class="side-link primary" href="/page.html?p=about-us/index">协会概况</a>
        <a class="side-link" href="/page.html?record=members">协会成员</a>
        <a class="side-link" href="/page.html?record=hall-of-fame">名人堂</a>
      </aside>

      <section class="feed">
        <section class="hero">
          <div>
            <p class="eyebrow">YUNA Campus Blog</p>
            <h1>最新动态</h1>
            <p class="lede">课程通知、活动记录、技术分享与协会公告。</p>
          </div>
          <img class="hero-mark" src="/logo.svg" alt="YUNA" />
        </section>
        <section class="campus-quick-grid" aria-label="核心入口">
          <a class="campus-card" href="/page.html?p=lessons/index">
            <span>授课资料</span>
            <strong>部门课程与录播整理</strong>
          </a>
          <a class="campus-card" href="/page.html?p=join-us/how-to">
            <span>招新通道</span>
            <strong>了解报名流程与笔试安排</strong>
          </a>
          <a class="campus-card" href="/page.html?p=about-us/index">
            <span>协会介绍</span>
            <strong>组织方向与部门职责</strong>
          </a>
        </section>
        <section class="feature-grid" data-feature-grid aria-label="最新动态精选"></section>
        <section class="section-head">
          <h2>动态流</h2>
          <p>News Feed</p>
        </section>
        <section class="post-list" data-post-list></section>
      </section>

      <aside class="float-panel float-right" aria-label="快捷入口">
        <p class="panel-kicker">部门导航</p>
        <h2>按方向查看</h2>
        <a class="side-link primary" href="/page.html?p=join-us/how-to">加入我们</a>
        <a class="side-link" href="/page.html?p=about-us/dept/dev">开发部</a>
        <a class="side-link" href="/page.html?p=about-us/dept/cybersec">网络安全部</a>
        <a class="side-link" href="/page.html?p=about-us/dept/maint">运维部</a>
        <a class="side-link" href="/page.html?p=about-us/dept/pr">组宣部</a>
        <a class="side-link" href="/page.html?p=about-us/dept/office">秘书处</a>
        <div class="side-divider"></div>
        <a class="side-link" href="/page.html?p=lessons/index">授课链接</a>
        <span class="side-auth" data-user-nav data-side-nav><a class="side-link" href="/api/auth/login">成员登录</a></span>
      </aside>
    </main>
    <script src="/app.js"></script>
    <script>
      window.blog.renderPostList();
      window.blog.renderUserNav();
    </script>
  </body>
</html>
